name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.name }} release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            platform: linux-x86_64
            extension: tar.gz

          - name: Windows
            os: windows-latest
            platform: windows-x86_64
            extension: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify README exists
        shell: bash
        run: |
          if [[ ! -f README.md ]]; then
            echo "README.md is required for release packages."
            exit 1
          fi

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake `
            -S . `
            -B build `
            -A x64

      - name: Build Linux
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: |
          ctest \
            --test-dir build \
            --build-config Release \
            --output-on-failure \
            --no-tests=ignore

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        run: |
          executable="$(find build -type f -name Chip8 -perm -111 | head -n 1)"

          if [[ -z "$executable" ]]; then
            echo "Linux Chip8 executable was not found."
            exit 1
          fi

          required_roms=(
            "1-chip8-logo.ch8"
            "2-ibm-logo.ch8"
            "3-corax+.ch8"
            "4-flags.ch8"
            "5-quirks.ch8"
            "6-keypad.ch8"
            "7-beep.ch8"
            "8-scrolling.ch8"
            "test_opcode.ch8"
          )

          package_name="chip8-${GITHUB_REF_NAME}-${{ matrix.platform }}"
          package_directory="package/$package_name"

          mkdir -p "$package_directory/roms"
          mkdir -p release-assets

          cp "$executable" "$package_directory/Chip8"
          cp README.md "$package_directory/README.md"

          if [[ -f LICENSE ]]; then
            cp LICENSE "$package_directory/LICENSE"
          fi

          if [[ -f THIRD_PARTY_LICENSES.md ]]; then
            cp THIRD_PARTY_LICENSES.md "$package_directory/"
          fi

          if [[ -d licenses ]]; then
            cp -R licenses "$package_directory/licenses"
          fi

          for rom in "${required_roms[@]}"; do
            if [[ ! -f "rom/$roms" ]]; then
              echo "Required ROM is missing: rom/$roms"
              exit 1
            fi

            cp "rom/$roms" "$package_directory/roms/"
          done

          tar \
            -czf "release-assets/$package_name.tar.gz" \
            -C package \
            "$package_name"

          cd release-assets
          sha256sum "$package_name.tar.gz" \
            > "$package_name.tar.gz.sha256"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $executable = Get-ChildItem `
            -Path build `
            -Recurse `
            -Filter Chip8.exe |
            Select-Object -First 1

          if (-not $executable) {
            throw "Windows Chip8.exe executable was not found."
          }

          $requiredRoms = @(
            "1-chip8-logo.ch8",
            "2-ibm-logo.ch8",
            "3-corax+.ch8",
            "4-flags.ch8",
            "5-quirks.ch8",
            "6-keypad.ch8",
            "7-beep.ch8",
            "8-scrolling.ch8",
            "test_opcode.ch8"
          )

          $packageName = "chip8-$env:GITHUB_REF_NAME-${{ matrix.platform }}"
          $packageDirectory = "package/$packageName"

          New-Item -ItemType Directory -Force -Path "$packageDirectory/rom" |
            Out-Null

          New-Item -ItemType Directory -Force -Path release-assets |
            Out-Null

          Copy-Item $executable.FullName "$packageDirectory/Chip8.exe"
          Copy-Item README.md "$packageDirectory/README.md"

          if (Test-Path LICENSE) {
            Copy-Item LICENSE "$packageDirectory/LICENSE"
          }

          if (Test-Path THIRD_PARTY_LICENSES.md) {
            Copy-Item THIRD_PARTY_LICENSES.md "$packageDirectory/"
          }

          if (Test-Path licenses) {
            Copy-Item licenses "$packageDirectory/licenses" -Recurse
          }

          foreach ($rom in $requiredRoms) {
            $romPath = "rom/$roms"

            if (-not (Test-Path $romPath)) {
              throw "Required ROM is missing: $romPath"
            }

            Copy-Item $romPath "$packageDirectory/roms/"
          }

          Compress-Archive `
            -Path $packageDirectory `
            -DestinationPath "release-assets/$packageName.zip"

          $hash = Get-FileHash `
            "release-assets/$packageName.zip" `
            -Algorithm SHA256

          "$($hash.Hash.ToLower())  $packageName.zip" |
            Set-Content "release-assets/$packageName.zip.sha256"

      - name: Upload packaged release
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-assets/
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged releases
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Display release files
        run: find release-assets -maxdepth 2 -type f -print

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t release_files < <(
            find release-assets -type f \
              \( \
                -name "*.tar.gz" \
                -o -name "*.zip" \
                -o -name "*.sha256" \
              \)
          )

          if [[ ${#release_files[@]} -eq 0 ]]; then
            echo "No release files were found."
            exit 1
          fi

          gh release create "$GITHUB_REF_NAME" \
            "${release_files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "CHIP-8 Emulator $GITHUB_REF_NAME"