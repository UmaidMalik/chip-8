name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.name }} release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            platform: linux-x86_64

          - name: Windows
            os: windows-latest
            platform: windows-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify required files
        shell: bash
        run: |
          required_files=(
            "README.md"
            "LICENSE"
            "THIRD_PARTY_LICENSES.md"
            "roms/1-chip8-logo.ch8"
            "roms/2-ibm-logo.ch8"
            "roms/3-corax+.ch8"
            "roms/4-flags.ch8"
            "roms/5-quirks.ch8"
            "roms/6-keypad.ch8"
            "roms/7-beep.ch8"
            "roms/8-scrolling.ch8"
            "roms/test_opcode.ch8"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Required file is missing: $file"
              exit 1
            fi
          done

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake `
            -S . `
            -B build `
            -A x64

      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build --parallel

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --no-tests=ignore

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        run: |
          package_name="chip8-${GITHUB_REF_NAME}-${{ matrix.platform }}"
          package_directory="$GITHUB_WORKSPACE/package/$package_name"
          release_directory="$GITHUB_WORKSPACE/release-assets"

          executable="$(find "$GITHUB_WORKSPACE/build" \
            -type f \
            -name Chip8 \
            -perm -111 \
            | head -n 1)"

          if [[ -z "$executable" ]]; then
            echo "Linux Chip8 executable was not found."
            exit 1
          fi

          mkdir -p "$package_directory/roms"
          mkdir -p "$release_directory"

          cp "$executable" "$package_directory/Chip8"
          cp README.md "$package_directory/README.md"
          cp LICENSE "$package_directory/LICENSE"
          cp THIRD_PARTY_LICENSES.md "$package_directory/THIRD_PARTY_LICENSES.md"

          if [[ -d licenses ]]; then
            cp -R licenses "$package_directory/licenses"
          fi

          cp roms/1-chip8-logo.ch8 "$package_directory/roms/"
          cp roms/2-ibm-logo.ch8 "$package_directory/roms/"
          cp roms/3-corax+.ch8 "$package_directory/roms/"
          cp roms/4-flags.ch8 "$package_directory/roms/"
          cp roms/5-quirks.ch8 "$package_directory/roms/"
          cp roms/6-keypad.ch8 "$package_directory/roms/"
          cp roms/7-beep.ch8 "$package_directory/roms/"
          cp roms/8-scrolling.ch8 "$package_directory/roms/"
          cp roms/test_opcode.ch8 "$package_directory/roms/"

          tar \
            -czf "$release_directory/$package_name.tar.gz" \
            -C "$GITHUB_WORKSPACE/package" \
            "$package_name"

          cd "$release_directory"

          sha256sum "$package_name.tar.gz" \
            > "$package_name.tar.gz.sha256"

          echo "Linux release assets:"
          find "$release_directory" -maxdepth 2 -type f -print

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageName = "chip8-$env:GITHUB_REF_NAME-${{ matrix.platform }}"
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "package"
          $packageDirectory = Join-Path $packageRoot $packageName
          $romDirectory = Join-Path $packageDirectory "roms"
          $releaseDirectory = Join-Path $env:GITHUB_WORKSPACE "release-assets"
          $buildDirectory = Join-Path $env:GITHUB_WORKSPACE "build"

          $executable = Get-ChildItem `
            -Path $buildDirectory `
            -Recurse `
            -File `
            -Filter "Chip8.exe" |
            Where-Object {
              $_.FullName -match "[\\/]Release[\\/]"
            } |
            Select-Object -First 1

          if (-not $executable) {
            throw "Windows Release executable Chip8.exe was not found."
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $romDirectory |
            Out-Null

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $releaseDirectory |
            Out-Null

          Copy-Item `
            $executable.FullName `
            (Join-Path $packageDirectory "Chip8.exe")

          Copy-Item `
            (Join-Path $env:GITHUB_WORKSPACE "README.md") `
            (Join-Path $packageDirectory "README.md")

          Copy-Item `
            (Join-Path $env:GITHUB_WORKSPACE "LICENSE") `
            (Join-Path $packageDirectory "LICENSE")

          Copy-Item `
            (Join-Path $env:GITHUB_WORKSPACE "THIRD_PARTY_LICENSES.md") `
            (Join-Path $packageDirectory "THIRD_PARTY_LICENSES.md")

          $licensesDirectory = Join-Path $env:GITHUB_WORKSPACE "licenses"

          if (Test-Path $licensesDirectory) {
            Copy-Item `
              $licensesDirectory `
              (Join-Path $packageDirectory "licenses") `
              -Recurse
          }

          $requiredRoms = @(
            "1-chip8-logo.ch8",
            "2-ibm-logo.ch8",
            "3-corax+.ch8",
            "4-flags.ch8",
            "5-quirks.ch8",
            "6-keypad.ch8",
            "7-beep.ch8",
            "8-scrolling.ch8",
            "test_opcode.ch8"
          )

          foreach ($rom in $requiredRoms) {
            $source = Join-Path `
              (Join-Path $env:GITHUB_WORKSPACE "roms") `
              $rom

            if (-not (Test-Path $source)) {
              throw "Required ROM is missing: $source"
            }

            Copy-Item $source $romDirectory
          }

          $zipPath = Join-Path $releaseDirectory "$packageName.zip"

          Compress-Archive `
            -Path $packageDirectory `
            -DestinationPath $zipPath `
            -Force

          $hash = Get-FileHash `
            -Path $zipPath `
            -Algorithm SHA256

          $checksumPath = Join-Path `
            $releaseDirectory `
            "$packageName.zip.sha256"

          "$($hash.Hash.ToLower())  $packageName.zip" |
            Set-Content $checksumPath

          Write-Host "Windows release assets:"
          Get-ChildItem $releaseDirectory -Recurse

      - name: Upload packaged release
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: ${{ github.workspace }}/release-assets/
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub release
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged releases
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Display downloaded release files
        shell: bash
        run: find release-assets -maxdepth 3 -type f -print

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t release_files < <(
            find release-assets \
              -type f \
              \( \
                -name "*.tar.gz" \
                -o -name "*.zip" \
                -o -name "*.sha256" \
              \) \
              -print
          )

          if [[ ${#release_files[@]} -eq 0 ]]; then
            echo "No release files were found."
            exit 1
          fi

          gh release create "$GITHUB_REF_NAME" \
            "${release_files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "CHIP-8 Emulator $GITHUB_REF_NAME"