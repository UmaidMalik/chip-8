name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure release build
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build release
        run: cmake --build build --parallel

      - name: Run tests
        run: |
          ctest \
            --test-dir build \
            --output-on-failure \
            --no-tests=ignore

      - name: Locate executable
        id: executable
        shell: bash
        run: |
          executable="$(find build -type f -name Chip8 -perm -111 | head -n 1)"

          if [[ -z "$executable" ]]; then
            echo "Chip8 executable was not found."
            exit 1
          fi

          echo "Found executable: $executable"
          echo "path=$executable" >> "$GITHUB_OUTPUT"

      - name: Package release
        shell: bash
        run: |
          package_name="chip8-${GITHUB_REF_NAME}-linux-x86_64"

          mkdir -p "dist/$package_name"
          cp "${{ steps.executable.outputs.path }}" \
            "dist/$package_name/Chip8"

          if [[ -f README.md ]]; then
            cp README.md "dist/$package_name/"
          fi

          if [[ -f LICENSE ]]; then
            cp LICENSE "dist/$package_name/"
          fi

          tar \
            -czf "dist/$package_name.tar.gz" \
            -C dist \
            "$package_name"

          cd dist
          sha256sum "$package_name.tar.gz" \
            > "$package_name.tar.gz.sha256"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz \
            dist/*.sha256 \
            --verify-tag \
            --generate-notes \
            --title "CHIP-8 Emulator $GITHUB_REF_NAME"