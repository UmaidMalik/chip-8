name: Build and Deploy Web Emulator

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            cmake \
            ninja-build \
            python3

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Show Emscripten version
        run: |
          emcc --version
          em++ --version

      - name: Configure web build
        run: |
          emcmake cmake \
            -S . \
            -B build-web \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build web emulator
        run: cmake --build build-web --parallel

      - name: Prepare GitHub Pages site
        shell: bash
        run: |
          index_file="$(find build-web -type f -name index.html -print -quit)"

          if [[ -z "$index_file" ]]; then
            echo "Generated index.html was not found."
            exit 1
          fi

          output_directory="$(dirname "$index_file")"

          echo "Web output directory: $output_directory"
          find "$output_directory" -maxdepth 2 -type f -print

          mkdir -p _site
          cp -a "$output_directory/." _site/

          # Prevent GitHub Pages from processing files through Jekyll.
          touch _site/.nojekyll

      - name: Verify deployment files
        shell: bash
        run: |
          required_files=(
            "_site/index.html"
            "_site/index.js"
            "_site/index.wasm"
            "_site/style.css"
            "_site/app.js"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Required web file is missing: $file"
              exit 1
            fi
          done

          # The data file exists when ROMs are preloaded.
          if [[ ! -f "_site/index.data" ]]; then
            echo "index.data is missing. Preloaded ROMs may not have been packaged."
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4