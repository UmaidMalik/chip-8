name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: |
          ctest \
            --test-dir build \
            --output-on-failure \
            --no-tests=ignore

      - name: Locate executable
        id: executable
        shell: bash
        run: |
          executable="$(find build -type f -name Chip8 -perm -111 | head -n 1)"

          if [[ -z "$executable" ]]; then
            echo "Chip8 executable was not found."
            exit 1
          fi

          echo "Found executable: $executable"
          echo "path=$executable" >> "$GITHUB_OUTPUT"

      - name: Prepare build artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp "${{ steps.executable.outputs.path }}" artifact/Chip8

          if [[ -f README.md ]]; then
            cp README.md artifact/
          fi

          if [[ -f LICENSE ]]; then
            cp LICENSE artifact/
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chip8-linux-x86_64
          path: artifact/
          if-no-files-found: error