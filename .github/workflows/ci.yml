name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            platform: linux-x86_64

          - name: Windows
            os: windows-latest
            platform: windows-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify README exists
        shell: bash
        run: |
          if [[ ! -f README.md ]]; then
            echo "README.md is required for build artifacts."
            exit 1
          fi

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure Linux
        if: runner.os == 'Linux'
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake `
            -S . `
            -B build `
            -A x64

      - name: Build Linux
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --no-tests=ignore

      - name: Prepare Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          executable="$(find build -type f -name Chip8 -perm -111 | head -n 1)"

          if [[ -z "$executable" ]]; then
            echo "Linux Chip8 executable was not found."
            exit 1
          fi

          mkdir -p artifact
          cp "$executable" artifact/Chip8
          cp README.md artifact/README.md

          if [[ -f LICENSE ]]; then
            cp LICENSE artifact/LICENSE
          fi

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $executable = Get-ChildItem `
            -Path build `
            -Recurse `
            -Filter Chip8.exe |
            Select-Object -First 1

          if (-not $executable) {
            throw "Windows Chip8.exe executable was not found."
          }

          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          Copy-Item $executable.FullName artifact/Chip8.exe
          Copy-Item README.md artifact/README.md

          if (Test-Path LICENSE) {
            Copy-Item LICENSE artifact/LICENSE
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chip8-${{ matrix.platform }}
          path: artifact/
          if-no-files-found: error