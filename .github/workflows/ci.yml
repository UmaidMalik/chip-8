name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            platform: linux-x86_64

          - name: Windows
            os: windows-latest
            platform: windows-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify required files
        shell: bash
        run: |
          required_files=(
            "README.md"
            "LICENSE"
            "THIRD_PARTY_LICENSES.md"
            "roms/1-chip8-logo.ch8"
            "roms/2-ibm-logo.ch8"
            "roms/3-corax+.ch8"
            "roms/4-flags.ch8"
            "roms/5-quirks.ch8"
            "roms/6-keypad.ch8"
            "roms/7-beep.ch8"
            "roms/8-scrolling.ch8"
            "roms/test_opcode.ch8"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Required file is missing: $file"
              exit 1
            fi
          done

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxfixes-dev \
            libxss-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev \
            libasound2-dev \
            libpulse-dev

      - name: Configure Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake \
            -S . \
            -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake `
            -S . `
            -B build `
            -A x64

      - name: Build Linux
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build --parallel

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --build-config Release --output-on-failure --no-tests=ignore

      - name: Prepare Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          artifact_dir="$GITHUB_WORKSPACE/artifact"
          rom_dir="$artifact_dir/roms"

          executable="$(find "$GITHUB_WORKSPACE/build" \
            -type f \
            -name Chip8 \
            -perm -111 \
            | head -n 1)"

          if [[ -z "$executable" ]]; then
            echo "Linux Chip8 executable was not found."
            exit 1
          fi

          mkdir -p "$rom_dir"

          cp "$executable" "$artifact_dir/Chip8"
          cp README.md "$artifact_dir/README.md"
          cp LICENSE "$artifact_dir/LICENSE"
          cp THIRD_PARTY_LICENSES.md "$artifact_dir/THIRD_PARTY_LICENSES.md"

          if [[ -d licenses ]]; then
            cp -R licenses "$artifact_dir/licenses"
          fi

          cp roms/1-chip8-logo.ch8 "$rom_dir/"
          cp roms/2-ibm-logo.ch8 "$rom_dir/"
          cp roms/3-corax+.ch8 "$rom_dir/"
          cp roms/4-flags.ch8 "$rom_dir/"
          cp roms/5-quirks.ch8 "$rom_dir/"
          cp roms/6-keypad.ch8 "$rom_dir/"
          cp roms/7-beep.ch8 "$rom_dir/"
          cp roms/8-scrolling.ch8 "$rom_dir/"
          cp roms/test_opcode.ch8 "$rom_dir/"

          echo "Linux artifact contents:"
          find "$artifact_dir" -maxdepth 3 -type f -print

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifactDirectory = Join-Path $env:GITHUB_WORKSPACE "artifact"
          $romDirectory = Join-Path $artifactDirectory "roms"
          $buildDirectory = Join-Path $env:GITHUB_WORKSPACE "build"

          $executable = Get-ChildItem `
            -Path $buildDirectory `
            -Recurse `
            -File `
            -Filter "Chip8.exe" |
            Where-Object {
              $_.FullName -match "[\\/]Release[\\/]"
            } |
            Select-Object -First 1

          if (-not $executable) {
            throw "Windows Release executable Chip8.exe was not found."
          }

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $romDirectory |
            Out-Null

          Copy-Item `
            $executable.FullName `
            (Join-Path $artifactDirectory "Chip8.exe")

          Copy-Item `
            (Join-Path $env:GITHUB_WORKSPACE "README.md") `
            (Join-Path $artifactDirectory "README.md")

          Copy-Item `
            (Join-Path $env:GITHUB_WORKSPACE "LICENSE") `
            (Join-Path $artifactDirectory "LICENSE")

          Copy-Item `
            (Join-Path $env:GITHUB_WORKSPACE "THIRD_PARTY_LICENSES.md") `
            (Join-Path $artifactDirectory "THIRD_PARTY_LICENSES.md")

          $licensesDirectory = Join-Path $env:GITHUB_WORKSPACE "licenses"

          if (Test-Path $licensesDirectory) {
            Copy-Item `
              $licensesDirectory `
              (Join-Path $artifactDirectory "licenses") `
              -Recurse
          }

          $requiredRoms = @(
            "1-chip8-logo.ch8",
            "2-ibm-logo.ch8",
            "3-corax+.ch8",
            "4-flags.ch8",
            "5-quirks.ch8",
            "6-keypad.ch8",
            "7-beep.ch8",
            "8-scrolling.ch8",
            "test_opcode.ch8"
          )

          foreach ($rom in $requiredRoms) {
            $source = Join-Path `
              (Join-Path $env:GITHUB_WORKSPACE "roms") `
              $rom

            if (-not (Test-Path $source)) {
              throw "Required ROM is missing: $source"
            }

            Copy-Item $source $romDirectory
          }

          Write-Host "Windows artifact contents:"
          Get-ChildItem $artifactDirectory -Recurse

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: chip8-${{ matrix.platform }}
          path: ${{ github.workspace }}/artifact/
          if-no-files-found: error
          retention-days: 14

  build-web:
    name: Build WebAssembly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            cmake \
            ninja-build \
            python3

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Show Emscripten version
        run: emcc --version

      - name: Configure WebAssembly build
        shell: bash
        run: |
          emcmake cmake \
            -S . \
            -B build-web \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build WebAssembly
        run: cmake --build build-web --parallel

      - name: Prepare web artifact
        shell: bash
        run: |
          index_file="$(find build-web -type f -name index.html -print -quit)"

          if [[ -z "$index_file" ]]; then
            echo "Generated index.html was not found."
            exit 1
          fi

          output_directory="$(dirname "$index_file")"
          artifact_directory="$GITHUB_WORKSPACE/artifact-web"

          mkdir -p "$artifact_directory"
          cp -a "$output_directory/." "$artifact_directory/"

          cp README.md "$artifact_directory/README.md"
          cp LICENSE "$artifact_directory/LICENSE"
          cp THIRD_PARTY_LICENSES.md \
            "$artifact_directory/THIRD_PARTY_LICENSES.md"

          if [[ -d licenses ]]; then
            cp -R licenses "$artifact_directory/licenses"
          fi

          required_files=(
            "index.html"
            "index.js"
            "index.wasm"
            "index.data"
            "app.js"
            "style.css"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$artifact_directory/$file" ]]; then
              echo "Required web output is missing: $file"
              exit 1
            fi
          done

          echo "Web artifact contents:"
          find "$artifact_directory" -maxdepth 3 -type f -print

      - name: Upload WebAssembly artifact
        uses: actions/upload-artifact@v4
        with:
          name: chip8-web-wasm
          path: artifact-web/
          if-no-files-found: error
          retention-days: 14